<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Framecast: map the font families that browsers/OSes provide but a Linux
       render container does not, onto installed, metric-compatible faces. This is
       what makes a server-side export line-break and center the same way the
       in-browser preview does. -->

  <!-- Apple / generic system-UI sans stacks -> Liberation Sans (Arial/Helvetica metrics) -->
  <match target="pattern"><test name="family"><string>-apple-system</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Liberation Sans</string></edit></match>
  <match target="pattern"><test name="family"><string>BlinkMacSystemFont</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Liberation Sans</string></edit></match>
  <match target="pattern"><test name="family"><string>SF Pro</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Liberation Sans</string></edit></match>
  <match target="pattern"><test name="family"><string>SF Pro Text</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Liberation Sans</string></edit></match>
  <match target="pattern"><test name="family"><string>SF Pro Display</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Liberation Sans</string></edit></match>
  <match target="pattern"><test name="family"><string>system-ui</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Liberation Sans</string></edit></match>
  <match target="pattern"><test name="family"><string>ui-sans-serif</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Liberation Sans</string></edit></match>
  <match target="pattern"><test name="family"><string>Segoe UI</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Liberation Sans</string></edit></match>
  <match target="pattern"><test name="family"><string>Helvetica Neue</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Liberation Sans</string></edit></match>
  <match target="pattern"><test name="family"><string>Helvetica</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Liberation Sans</string></edit></match>
  <match target="pattern"><test name="family"><string>Arial</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Liberation Sans</string></edit></match>

  <!-- Monospace UI stacks -->
  <match target="pattern"><test name="family"><string>ui-monospace</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Liberation Mono</string></edit></match>
  <match target="pattern"><test name="family"><string>SF Mono</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Liberation Mono</string></edit></match>
  <match target="pattern"><test name="family"><string>Menlo</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Liberation Mono</string></edit></match>

  <!-- Serif UI stacks -->
  <match target="pattern"><test name="family"><string>ui-serif</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Liberation Serif</string></edit></match>

  <!-- Always give emoji a colour fallback so emoji/icon glyphs never drop to tofu -->
  <match target="pattern"><test name="family"><string>sans-serif</string></test>
    <edit name="family" mode="append"><string>Noto Color Emoji</string></edit></match>
  <match target="pattern"><test name="family"><string>serif</string></test>
    <edit name="family" mode="append"><string>Noto Color Emoji</string></edit></match>
  <match target="pattern"><test name="family"><string>monospace</string></test>
    <edit name="family" mode="append"><string>Noto Color Emoji</string></edit></match>

  <!-- Default generic families to installed faces (broad Unicode + emoji last) -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Liberation Sans</family>
      <family>Noto Sans</family>
      <family>DejaVu Sans</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>
  <alias>
    <family>serif</family>
    <prefer>
      <family>Liberation Serif</family>
      <family>Noto Serif</family>
      <family>DejaVu Serif</family>
    </prefer>
  </alias>
  <alias>
    <family>monospace</family>
    <prefer>
      <family>Liberation Mono</family>
      <family>DejaVu Sans Mono</family>
    </prefer>
  </alias>
</fontconfig>
